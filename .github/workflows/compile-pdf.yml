name: Compile LaTeX PDF
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: ss1_math_textbook

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss1-math-textbook-pdf
          path: ss1_math_textbook/main.pdf

      - name: Save PDF and cleanup
        run: |
          mkdir -p saves
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp ss1_math_textbook/main.pdf saves/textbook_$TIMESTAMP.pdf

          # Keep only the last 3 recent compilations
          cd saves
          ls -t textbook_*.pdf | tail -n +4 | xargs -r rm
          cd ..

          # Commit and push
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add saves/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Save compiled PDF $TIMESTAMP and cleanup old versions"
            git push
          fi
